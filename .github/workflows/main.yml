name: Pipeline de Pruebas PvZ

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' 

    - name: Restaurar dependencias
      run: dotnet restore TopiLabo15_PVZ.slnx

    - name: Compilar Proyecto
      run: dotnet build TopiLabo15_PVZ.slnx --configuration Release --no-restore

    # Quitamos el --no-build para que GitHub genere el archivo .dll que le falta
    - name: Ejecutar Pruebas Unitarias
      run: dotnet test PruebasUnitarias.Tests/PruebasUnitarias.Tests.csproj --verbosity normal

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install pyautogui pytest

    - name: Ejecutar Pruebas de UI (PyAutoGUI)
      run: python -m pytest tests_ui/